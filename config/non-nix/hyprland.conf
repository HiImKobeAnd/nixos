monitor=,preferred,auto,auto

###################
### MY PROGRAMS ###
###################

# Noctalia ipc call
$ipc = noctalia-shell ipc call

# Set programs that you use
$terminal = alacritty
$fileManager = dolphin
$browser = librewolf

env = HYPRCURSOR_THEME,rose-pine-hyprcursor

#################
### AUTOSTART ###
#################

exec-once = noctalia-shell
exec-once = hyprpaper
exec-once = hyprctl plugin load $HY3_PATH
exec-once = [workspace 1 silent] pear-desktop %u
exec-once = [workspace 1 silent] discord --ozone-platform=x11
exec-once = [workspace 2 silent] $browser
exec-once = [workspace magic silent] obsidian


#############################
### ENVIRONMENT VARIABLES ###
#############################

env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24


#####################
### LOOK AND FEEL ###
#####################

# https://wiki.hyprland.org/Configuring/Variables/#general
general { 
    gaps_in = 0
    gaps_out = 1

    border_size = 1

    col.active_border = rgba(33ccffee) rgba(00ff99ee) 45deg
    col.inactive_border = rgba(595959aa)

    layout = hy3
}

# https://wiki.hyprland.org/Configuring/Variables/#animations
animations {
    enabled = true
    bezier = myBezier, 0.05, 0.9, 0.1, 1.05

    animation = windows, 1, 7, myBezier
    animation = windowsOut, 1, 7, default, popin 80%
    animation = border, 1, 10, default
    animation = borderangle, 1, 8, default
    animation = fade, 1, 7, default
    animation = workspaces, 1, 3, default, slidevert
}

# See https://wiki.hyprland.org/Configuring/Dwindle-Layout/ for more
dwindle {
    pseudotile = true # Master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = true # You probably want this
}

# See https://wiki.hyprland.org/Configuring/Master-Layout/ for more
master {
    new_status = master
}

# https://wiki.hyprland.org/Configuring/Variables/#misc
misc { 
    force_default_wallpaper = 0 # Set to 0 or 1 to disable the anime mascot wallpapers
    disable_hyprland_logo = true # If true disables the random hyprland logo / anime girl background. :(
}


#############
### INPUT ###
#############

input {
    kb_layout = dk
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =

    follow_mouse = 1

    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.

    touchpad {
        natural_scroll = false
    }
}

####################
### KEYBINDINGSS ###
####################

$mainMod = SUPER # Sets "Windows" key as main modifier

# Applications
bind = $mainMod, T, exec, $terminal
bind = $mainMod, B, exec, $browser
bind = $mainMod, O, exec, obsidian
bind = $mainMod, E, exec, thunderbird
bind = $mainMod, A, exec, anki
bind = $mainMod, Z, exec, zotero

# Desktop
bindr = $mainMod, Super_L , exec, $ipc launcher toggle
bind = $mainMod, Q, killactive
bind = $mainMod, Escape, exec, $ipc sessionMenu toggle
bind = $mainMod, Y, togglefloating
bind = $mainMod, F, fullscreen
binde = , XF86MonBrightnessUp, exec, $ipc brightness increase
binde = , XF86MonBrightnessDown, exec, $ipc brightness decrease
bind = , Print, exec, grim -g "$(slurp -d)" - | wl-copy
bind = Ctrl, Print, exec, grim -g "$(slurp)"

# Audio
binde = , XF86AudioRaiseVolume, exec, $ipc volume increase
binde = , XF86AudioLowerVolume, exec, $ipc volume decrease
bind = , XF86AudioPlay, exec, playerctl play-pause
bind = SHIFT, XF86AudioPlay, exec, playerctl previous
bind = , XF86AudioNext, exec, playerctl next

bind = , F23, pass, class:^(discord)$
bind = , F24, pass, class:^(discord)$
bind = , mouse:282, pass, class:^(discord)$

# Move focus with mainMod + arrow keys
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Move window with mainMod + Shift + arrow keys
bind = $mainMod SHIFT, left, movewindow, l
bind = $mainMod SHIFT, right,movewindow, r
bind = $mainMod SHIFT, up, movewindow, u
bind = $mainMod SHIFT, down, movewindow, d

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

bind = $mainMod SHIFT CTRL, up, movetoworkspace, e-1
bind = $mainMod SHIFT CTRL, down, movetoworkspace, e+1

# Example special workspace (scratchpad)
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

bind = $mainMod CTRL, up, workspace, e-1
bind = $mainMod CTRL, down, workspace, e+1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow


##############################
### WINDOWS AND WORKSPACES ###
##############################

workspace = 1, monitor:HDMI-A-3, persistent:true
workspace = 2, monitor:HDMI-A-3, persistent:true
workspace = 3, monitor:HDMI-A-3, persistent:true
workspace = 4, monitor:HDMI-A-3, persistent:true

# windowrule {
# name = move-hyprland-run
#
# match:class = hyprland-run
# move = 20 monitor_h-120
# float = yes
# }

windowrule {
    name = librewolf-pip
    match:title = ^(Picture-in-Picture)$
    match:class = ^(librewolf)$
    
    float = on
    pin = on
    size = 480 270
    move = 100%-820 100%-470
    keep_aspect_ratio = on
}
